name: Test
on:
    push

defaults:
    run:
        shell: bash

concurrency:
    group: ${{ github.workflow }}
    cancel-in-progress: true

jobs:
    first:
        runs-on: ubuntu-latest
        steps:
            - run: sleep 10 && echo "First job"
    second:
        runs-on: ubuntu-latest
        needs: [first]
        steps:
            - run: sleep 10 && echo "Second job"
    third:
        runs-on: ubuntu-latest
        needs: [second]
        steps:
            - run: sleep 10 && echo "Third job"